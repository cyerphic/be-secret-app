version: "3.3"

services:
  app:
    image: be-secret-app
    build:
      context: .
      dockerfile: Dockerfile
    container_name: be-secret-app
    # showing Expo QR code
    stdin_open: true
    tty: true
    ports:
      - "19006:19006"
      - "8081:8081"
    volumes:
      - .:/app
      - /app/node_modules

    #command: sh -c "npm install && npx expo start --lan"
    command: sh -c "npx expo start --lan"
    environment:
      - NODE_ENV=development
      - EXPO_NO_TELEMETRY=1
      - CHOKIDAR_USEPOLLING=true
      - EXPO_DEVTOOLS_LISTEN_ADDRESS=0.0.0.0
      - REACT_NATIVE_PACKAGER_HOSTNAME=192.168.1.6
    networks:
      - be-secret-network

# Defined NetWork
networks:
  be-secret-network:
    driver: bridge
