plugins {
  id 'com.android.library'
  id 'expo-module-gradle-plugin'
}

group = 'expo.modules.rustcryptcore'
version = '0.7.10'

android {
  dependencies {
    implementation "net.java.dev.jna:jna:5.14.0@aar"
  }
  namespace "expo.modules.rustcryptcore"
  defaultConfig {
    versionCode 1
    versionName "0.7.10"
  }
  lintOptions {
    abortOnError false
  }
}
